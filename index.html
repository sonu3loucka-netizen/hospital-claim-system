<!DOCTYPE html>
<html>
<head>
  <title>Claim Dashboard</title>
  <style>
    body {
      <script>
if(!localStorage.getItem("loggedIn")) {
  window.location.href = "login.html";
}
</script>
      font-family: Arial;
      background: #eef2f7;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 0 5px gray;
    }
  </style>
</head>

<body>

<div style="display:flex; justify-content:space-between; align-items:center;">
  <h1>🏥 Insurance Claim System</h1>
  <button onclick="logout()" style="padding:8px 15px; background:red; color:white; border:none; border-radius:5px;">
    Logout
  </button>
</div>

<div class="card">
  <h3>Rahul Sharma</h3>
  <p>Status: ✅ Approved</p>
</div>

<div class="card">
  <h3>Priya Singh</h3>
  <p>Status: ⏳ Pending</p>
</div>

<div class="card">
  <h3>Amit Patel</h3>
  <p>Status: ⚠️ Query Raised</p>
</div>
<script>
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}
</script>
</body>
</html>
