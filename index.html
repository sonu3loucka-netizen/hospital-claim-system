<!DOCTYPE html>
<html>
<head>
  <title>Claim Dashboard</title>
  <style>
    body {
      <script>
if(!localStorage.getItem("loggedIn")) {
  window.location.href = "login.html";
}
</script>
      <button onclick="showForm()" style="margin:20px 0; padding:10px 20px; background:green; color:white; border:none; border-radius:5px;">
  + Add New Claim
</button>
      <div id="claimForm" style="display:none; background:white; padding:20px; border-radius:10px; margin-bottom:20px;">

  <h3>New Claim</h3>

  <input type="text" id="name" placeholder="Patient Name"><br><br>
  <input type="text" id="hospital" placeholder="Hospital Name"><br><br>
  <input type="text" id="policy" placeholder="Policy Number"><br><br>

  <select id="status">
    <option>Pending</option>
    <option>Approved</option>
    <option>Query Raised</option>
  </select><br><br>

  <button onclick="addClaim()">Save Claim</button>

</div>
      font-family: Arial;
      background: #eef2f7;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 0 5px gray;
    }
  </style>
</head>

<body>

<div style="display:flex; justify-content:space-between; align-items:center;">
  <h1>🏥 Insurance Claim System</h1>
  <button onclick="logout()" style="padding:8px 15px; background:red; color:white; border:none; border-radius:5px;">
    Logout
  </button>
</div>
  <button onclick="showForm()" style="margin:20px 0; padding:10px 20px; background:green; color:white; border:none; border-radius:5px;">
  + Add New Claim
</button>
  <div id="claimForm" style="display:none; background:white; padding:20px; border-radius:10px; margin-bottom:20px;">

  <h3>New Claim</h3>

  <input type="text" id="name" placeholder="Patient Name"><br><br>
  <input type="text" id="hospital" placeholder="Hospital Name"><br><br>
  <input type="text" id="policy" placeholder="Policy Number"><br><br>

  <select id="status">
    <option>Pending</option>
    <option>Approved</option>
    <option>Query Raised</option>
  </select><br><br>

  <button onclick="addClaim()">Save Claim</button>

</div>
  <div id="cases"></div>

<div class="card">
  <h3>Rahul Sharma</h3>
  <p>Status: ✅ Approved</p>
</div>

<div class="card">
  <h3>Priya Singh</h3>
  <p>Status: ⏳ Pending</p>
</div>

<div class="card">
  <h3>Amit Patel</h3>
  <p>Status: ⚠️ Query Raised</p>
</div>
<script>
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}
</script>
  <script>
let claims = JSON.parse(localStorage.getItem("claims")) || [];

function showForm() {
  document.getElementById("claimForm").style.display = "block";
}

function addClaim() {
  let name = document.getElementById("name").value;
  let hospital = document.getElementById("hospital").value;
  let policy = document.getElementById("policy").value;
  let status = document.getElementById("status").value;

  let claim = {
    name,
    hospital,
    policy,
    status
  };

  claims.push(claim);
  localStorage.setItem("claims", JSON.stringify(claims));
  displayClaims();

  document.getElementById("claimForm").style.display = "none";
}

function displayClaims() {
  let html = "";

  claims.forEach(c => {
    html += `
      <div class="card">
        <h3>${c.name}</h3>
        <p>Hospital: ${c.hospital}</p>
        <p>Policy: ${c.policy}</p>
        <p>Status: ${c.status}</p>
      </div>
    `;
  });

  document.getElementById("cases").innerHTML = html;
}
displayClaims();
</script>

</body>
</html>
